spring:
  application:
    name: dipdv-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dipdv}
    username: ${DB_USERNAME:dipdv}
    password: ${DB_PASSWORD:dipdv}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

dipdv:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-32chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: 604800000
  security:
    bcrypt-strength: 12

security:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-32chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}
